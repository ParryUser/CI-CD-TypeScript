name: ci

on:
  push:
    branches: [tests]
    
jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --coverage